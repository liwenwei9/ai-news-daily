name: Deploy AI News Daily

on:
  schedule:
    - cron: '0 23 * * *'  # 北京时间早7点
  workflow_dispatch:  # 仅保留手动触发，关闭push触发避免重复
  # 注释push触发：避免代码提交时重复运行导致artifact冲突
  # push:
  #   branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true  # 强制取消正在运行的流程

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
  
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        clean: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install openai>=1.30.1 arxiv>=1.4.7 feedparser>=6.0.10 pytz>=2024.1

    - name: Run AI News Aggregator
      run: |
        rm -f index.html
        python github_main.py
        if [ ! -f "index.html" ]; then
          echo "⚠️ 创建兜底页面"
          echo "<html><body><h1>AI News Daily</h1></body></html>" > index.html
        fi
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    - name: Setup Pages
      uses: actions/configure-pages@v4

    # 核心：自定义唯一artifact名称，避免冲突
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
        name: "ai-news-daily-pages"  # 唯一名称，不再用默认的github-pages

    # 核心：指定自定义artifact名称部署
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      with:
        artifact_name: "ai-news-daily-pages"  # 匹配上面的名称
