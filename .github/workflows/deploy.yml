name: Deploy AI News Daily

on:
  schedule:
    # ========== 修改点1：定时时间改为北京时间早7点 ==========
    # 原：0 0 * * * (UTC 0点 = 北京时间8点)
    # 新：0 23 * * * (UTC 23点 = 北京时间次日7点)
    - cron: '0 23 * * *'
  workflow_dispatch:  # 手动触发保留
  push:
    branches: [ main ]  # 推送到main分支触发保留

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
  
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
  
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
  
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt        
  
    - name: Run AI News Aggregator
      run: |
        python github_main.py        
  
    - name: Setup Pages
      uses: actions/configure-pages@v4
  
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        # ========== 修改点2：修复docs文件夹路径问题 ==========
        # 原：path: 'docs' (找不到文件夹报错)
        # 新：path: '.' (根目录，对应你生成的index.html)
        path: '.'
  
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
