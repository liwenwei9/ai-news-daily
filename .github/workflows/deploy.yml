name: Deploy AI News Daily

on:
  schedule:
    - cron: '0 23 * * *'  # 北京时间早7点
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
  
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        clean: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies (强制安装所有依赖)
      run: |
        python -m pip install --upgrade pip
        # 强制安装核心依赖，避免requirements.txt缺失/错误
        pip install openai>=1.30.1 arxiv>=1.4.7 feedparser>=6.0.10 pytz>=2024.1
        # 验证所有依赖
        pip list | grep -E "openai|arxiv|feedparser|pytz"
        # 最终验证openai是否能导入
        python -c "import openai; print(f'✅ OpenAI导入成功，版本: {openai.__version__}')"

    - name: Run AI News Aggregator (加载API Key)
      run: |
        rm -f index.html
        # 验证API Key是否存在
        if [ -n "$DEEPSEEK_API_KEY" ]; then
          echo "✅ DeepSeek API Key已配置"
        else
          echo "❌ DeepSeek API Key未配置"
        fi
        # 运行脚本
        python github_main.py
        # 兜底逻辑
        if [ -f "index.html" ]; then
          echo "✅ index.html生成成功，大小: $(du -h index.html | cut -f1)"
        else
          echo "❌ index.html未生成，创建兜底页面"
          echo "<!DOCTYPE html><html><body><h1>AI News Daily</h1><p>页面生成中...</p></body></html>" > index.html
        fi
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload GitHub Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
