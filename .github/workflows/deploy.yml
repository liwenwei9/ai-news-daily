name: Deploy AI News Daily

on:
  schedule:
    # 北京时间早7点（UTC 23点）
    - cron: '0 23 * * *'
  workflow_dispatch:  # 手动触发
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true  # 取消正在进行的部署，避免重复

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
  
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        clean: true  # 清理工作区残留

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt        

    - name: Run AI News Aggregator
      run: |
        # 清理旧文件 + 运行脚本 + 验证文件
        rm -f index.html
        python github_main.py
        
        # 关键：强制验证并兜底，确保index.html存在
        if [ ! -f "index.html" ]; then
          echo "⚠️ index.html未生成，创建兜底页面"
          echo "<!DOCTYPE html><html><body><h1>AI News Daily</h1><p>页面生成中...</p></body></html>" > index.html
        fi
        ls -la index.html  # 日志中显示文件信息

    - name: Setup Pages
      uses: actions/configure-pages@v4

    # 核心修复：用官方默认名称上传artifact（github-pages）
    - name: Upload GitHub Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'  # 根目录，包含index.html
        # 不自定义name，使用默认值：github-pages

    # 修复参数错误 + 用默认artifact名称部署
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      # 去掉错误的artifact-name/force参数，使用默认配置
