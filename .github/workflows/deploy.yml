name: Deploy AI News Daily

on:
  schedule:
    - cron: '0 23 * * *'  # 北京时间早7点
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
  
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        clean: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies (验证安装)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 验证依赖是否安装成功
        pip list | grep -E "openai|arxiv|feedparser"
        python -c "import openai; print(f'OpenAI版本: {openai.__version__}')"

    - name: Run AI News Aggregator (加载API Key)
      run: |
        rm -f index.html
        # 打印API Key是否配置（仅验证存在，不显示密钥）
        if [ -n "$DEEPSEEK_API_KEY" ]; then
          echo "✅ DeepSeek API Key已配置"
        else
          echo "❌ DeepSeek API Key未配置"
        fi
        # 运行脚本
        python github_main.py
        # 验证文件生成
        if [ -f "index.html" ]; then
          echo "✅ index.html生成成功，文件大小：$(du -h index.html | cut -f1)"
        else
          echo "❌ index.html未生成，创建兜底页面"
          echo "<!DOCTYPE html><html><body><h1>AI News Daily</h1><p>页面生成中...</p></body></html>" > index.html
        fi
      # 核心：从GitHub Secrets加载API Key到环境变量
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload GitHub Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
